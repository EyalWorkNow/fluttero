[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/lead"
  to = "/.netlify/functions/lead"
  status = 200

[[redirects]]
  from = "/api/leads"
  to = "/.netlify/functions/lead"
  status = 200

# SPA fallback — all unknown routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
